<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">


<div id="auth-container" class="flex justify-center items-center h-screen">

  <div class="bg-slate-800 p-6 rounded-2xl w-80 shadow-lg">


    <div id="signup-page">
      <h2 class="text-2xl font-bold mb-4">Sign Up</h2>

      <input id="signup-username" type="text" placeholder="Username"
        class="w-full p-2 mb-3 rounded bg-slate-700">

      <input id="signup-email" type="email" placeholder="Email"
        class="w-full p-2 mb-3 rounded bg-slate-700">

      <input id="signup-password" type="password" placeholder="Password"
        class="w-full p-2 mb-3 rounded bg-slate-700">

      <button id="signupBtn"
        class="w-full bg-blue-500 hover:bg-blue-600 p-2 rounded">
        Sign Up
      </button>

      <p class="mt-3 text-sm">
        Already have an account?
        <span id="goLogin" class="text-blue-400 cursor-pointer underline">Login</span>
      </p>
    </div>

    <div id="login-page" class="hidden">
      <h2 class="text-2xl font-bold mb-4">Login</h2>

      <input id="login-username" type="text" placeholder="Username"
        class="w-full p-2 mb-3 rounded bg-slate-700">

      <input id="login-password" type="password" placeholder="Password"
        class="w-full p-2 mb-3 rounded bg-slate-700">

      <button id="loginBtn"
        class="w-full bg-green-500 hover:bg-green-600 p-2 rounded">
        Login
      </button>

      <p class="mt-3 text-sm">
        Don't have an account?
        <span id="goSignup" class="text-blue-400 cursor-pointer underline">Sign Up</span>
      </p>
    </div>

  </div>
</div>


<div id="user-section" class="hidden">


  <div class="flex justify-between items-center p-4">
    <h1 class="text-xl font-bold">Users</h1>
    <button id="logoutBtn" class="bg-red-500 px-4 py-1 rounded">Logout</button>
  </div>


  <div id="user-container"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-6">
  </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
