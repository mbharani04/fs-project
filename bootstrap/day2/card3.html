<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIKE REPAIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card3.css">
    <link rel="icon" type="image/x-icon" href="images/logo.jpg">
</head>
<body>
<div class="form-wrapper">
    <div class="premium-container">
        <div class="form-header">
            <h2>Bike Repair Booking</h2>
            <p>Tell us what's wrong with your vehicle.</p>
        </div>

        <form action="#" method="POST">
            <!-- Customer Details -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe *" required>
            </div>

            <div class="form-group row">
                <div>
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter phone number *" required>
                </div>
                <div>
                    <label>Alternate Number</label>
                    <input type="tel" placeholder="Optional">
                </div>
            </div>

            <div class="form-group">
                <label>Current Address</label>
                <textarea name="address" rows="2" placeholder="Enter current address *" required></textarea>
            </div>

            <!-- Bike Details -->
            <div class="form-group">
                <label>Bike Model</label>
                <input type="text" placeholder="e.g. Honda Activa, Royal Enfield *" required>
            </div>

            <div class="form-group">
                <label>Service Required</label>
                <div class="checkbox-grid">
                    <label class="checkbox-label"><input type="checkbox"> Engine</label>
                    <label class="checkbox-label"><input type="checkbox"> Brake</label>
                    <label class="checkbox-label"><input type="checkbox"> Light</label>
                    <label class="checkbox-label"><input type="checkbox"> Tyre</label>
                    <label class="checkbox-label"><input type="checkbox"> Battery</label>
                    <label class="checkbox-label"><input type="checkbox"> Clutch/Gear</label>
                    <label class="checkbox-label"><input type="checkbox"> Body Repair</label>
                </div>
            </div>

            <!-- Date & Time -->
            <div class="form-group row">
                <div>
                    <label>Preferred Date</label>
                    <input type="date" required>
                </div>
                <div>
                    <label>Preferred Time</label>
                    <input type="time" required>
                </div>
            </div>

            <!-- Problem Description -->
            <div class="form-group">
                <label>Describe the Problem <span class="optional">(Optional)</span></label>
                <textarea rows="3" placeholder="Briefly explain the issue..."></textarea>
            </div>

            <!-- Pickup & Drop Options -->
            <div class="form-group row">
                <div>
                    <label>Pickup Service</label>
                    <select>
                        <option>No</option> 
                        <option>Yes</option>
                    </select>
                </div>
                <div>
                    <label>Drop Service</label>
                    <select>
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </div>
            </div>

            <!-- Optional Addresses if pickup/drop selected -->
            <div class="form-group row">
                <div>
                    <input type="text" placeholder="Pickup Address (if needed)">
                </div>
                <div>
                    <input type="text" placeholder="Drop Address (if needed)">
                </div>
            </div>

            <button type="submit" class="btn-submit">Book Repair</button>

            <div class="form-footer">
                <a href="view3.html">View Service Details & Pricing →</a>
                <br><br>
                <a href="index.html">← Back to Home</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
