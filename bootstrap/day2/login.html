<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sign In</title>
    <link rel="icon" type="image/x-icon" href="images/logo.jpg">

    <!-- Deep/Rich Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Modern Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css"> <!-- Global Premium Styles -->
    <link rel="stylesheet" href="css/login.css"> <!-- Specific Login Styles -->
</head>

<body>

    <!-- Ambient glowing shapes -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="card-header">
                <div class="icon-brand">
                    <i class="ri-fingerprint-line"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your account.</p>
            </div>

            <form class="login-form">

                <div class="input-group">
                    <i class="ri-user-3-line"></i>
                    <input type="text" id="username" placeholder=" " required autocomplete="off">
                    <label for="username">Username</label>
                </div>

                <div class="input-group">
                    <i class="ri-lock-password-line"></i>
                    <input type="password" id="password" placeholder=" " required autocomplete="off">
                    <label for="password">Password</label>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i class="ri-arrow-right-line"></i>
                </button>

                <p class="signup-link">Don't have an account? <a href="#">Create one</a></p>
            </form>

        </div>
    </div>

</body>

</html>
