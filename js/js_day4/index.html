function gradeSystem() {
    let students_mark = 82;

    if (students_mark >= 90) {
        console.log("Grade A");
    } else if (students_mark >= 75) {

    } else {
        console.log("Fail");
    }
}

function leapYear() {
    let year = 2004;

    if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
        console.log("Leap Year");
    } else {
        console.log("Not a Leap Year");
    }
}
leapYear();

function divisibleCheck() {
    let setNum = 25;

    if (setNum % 6 === 0 && setNum % 7 === 0) {
        console.log("Divisible by both 6 and 7");
    } else if (setNum % 6 === 0) {
        console.log("Divisible by 6 only");
    } else if (setNum % 7 === 0) {
        console.log("Divisible by 7 only");
    } else {
        console.log("Not divisible by 6 or 7");
    }
}
divisibleCheck();

function discountCalc() {
    let priceValue = 900;

    if (priceValue > 700) {
        let discount = priceValue * 0.5;
        let finalPrice = priceValue - discount;
        console.log("Discount applied:", discount);
        console.log("Final Price:", finalPrice);
    } else {
        console.log("No Discount");
    }
}
discountCalc();

function temperatureCheck() {
    let tempValue = 25;

    if (tempValue > 30) {
        console.log("Hot");
    } else if (tempValue >= 20 && tempValue <= 30) {
        console.log("Normal");
    } else {
        console.log("Cold");
    }
}

}
