<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>changing color</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
        <h1 class = "flex justify-center bg-green-500 m-3 p-4 font-blod text-2xl">
            Changing color when type and click
        </h1>
    </header>
    <main>
  
            <div class = "flex justify-center m-2 bg-blue-300 p-6">
            <input type="text" id ="colorInput" placeholder="enter the color" class="bg-purple-500 border-black rounded-md  py-2 px-4 m-5 flex justify-center">
            <p id="Text"></p>
             </div>


            <div>
                <button id="colorbtn" class = "flex justify-center bg-pink-500 text-white py-2 px-4 rounded-md hover:bg-pink-600 m-4"> click me</button>
            </div>    
      

        <div  class = "flex justify-center  ">
            <div id="colorDisplay" class = "flex justify-center items-center m-5 bg-orange-400 px-4 py-2 rounded-full h-100 w-100">
            colors are change click the button
        </div>

        </div>
        

  
    </main>




    <script src = "js/color.js"></script>
    
</body>
</html>
