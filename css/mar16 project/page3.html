<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Booking form</title>
    <link rel="stylesheet"  href="css/page3.css">

</head>
<body>
    <div class="container">
        <h2 class="menu">Driver Booking Form</h2>
    </div>
    <form>
        <div>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your Driver Name" required>
        
        <label>Phone Number</label>
        <input type="Number" placeholder="Enter your Number" required>
        <label>Pickup Location</label>
        <input type="text" placeholder="Enter Pickup Location" required>
        <label for="Drop Location"></label>
        <input type="text" placeholder="Enter Drop Location" required>

        <label>Date</label>
        <input type="date" required>
        
        <label>Time</label>
        <input type="time" required>

        <label>Vechile type</label>
        <select>
            <option value=""selected disabled>Select One</option>
            <option>"bike">Bike</option>
            <option>"auto">Auto</option>
            <option>"Lorry">Lorry</option>
            <option>"bus">Bus</option>
        </select>

        <label>Special Instruction</label>
        <textarea placeholder="Any Instruction"></textarea>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">
        
    
    </div>


    </form>
</body>
</html>
